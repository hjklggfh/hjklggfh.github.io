<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>炮台图鉴 - 保卫萝卜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:Segoe UI,sans-serif;color:#fff;padding:20px}
h1{text-align:center;font-size:32px;background:linear-gradient(90deg,#ffd700,#ff6b6b,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.note{text-align:center;color:#ffd700;font-size:13px;margin-bottom:20px;background:rgba(255,200,0,0.1);padding:8px;border-radius:8px;max-width:700px;margin-left:auto;margin-right:auto}
.tower-card{max-width:960px;margin:24px auto;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px}
h2{font-size:24px;margin-bottom:4px}
.desc{color:#aaa;font-size:14px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
th{background:rgba(255,255,255,0.1);padding:8px 10px;text-align:left}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.06)}
tr:hover td{background:rgba(255,255,255,0.03)}
.back-btn{display:inline-block;background:rgba(255,255,255,0.1);color:#fff;text-decoration:none;padding:8px 20px;border-radius:8px;margin:20px 0;font-size:14px}
.back-btn:hover{background:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<h1>🗼 炮台图鉴 · 👾 怪物图鉴</h1>
<div class="note">📋 数据来源：js/data/data.js · 修改后刷新页面即可同步</div>
<div id="tower-section"></div>
<div id="monster-section"></div>
<div style="text-align:center;padding:30px"><a href="../index.html" class="back-btn">🏠 返回主菜单</a></div>
<script src="../js/data/data.js"></script>
<script>
(function(){
var cfg=GameConfig;
var th="";
var keys=Object.keys(cfg.towers);
for(var ti=0;ti<keys.length;ti++){
 var t=cfg.towers[keys[ti]];
 var desc=t.description||"";
 if(t.hasSplash)desc+=" · 溅射"+t.splashRadius+"px"+(t.splashDamage?"("+t.splashDamage+"伤害)":"");
 if(t.isPenetrating)desc+=" · 穿透";
 if(t.appliesSlow)desc+=" · 减速"+Math.round((1-t.slowFactor)*100)+"%";
 if(t.isBeam)desc+=" · 激光束";
 if(t.isAOE)desc+=" · AOE灼伤";
 if(t.isPulseAOE)desc+=" · 脉冲"+t.pulseRadius+"px";
 if(t.prioritizeBoss)desc+=" · 优先Boss";
 var baseHP=t.towerHP||30;
 th+="<div class=\"tower-card\"><h2 style=\"color:"+t.color+"\">"+t.icon+" "+t.name+"</h2><div class=\"desc\">"+desc+"</div>";
 th+="<table><tr><th>Lv</th><th>射程</th><th>攻速</th><th>伤害</th><th>HP</th><th>升级费</th><th>售出价</th></tr>";
 for(var l=0;l<t.levels.length;l++){
  var lv=t.levels[l];
  var hp=Math.round(baseHP*Math.pow(1.2,l));
  th+="<tr><td>Lv"+(l+1)+"</td><td>"+lv.range+"</td><td>"+lv.fireRate+"</td><td>"+lv.damage+"</td><td>"+hp+"</td><td>"+(lv.upgradeCost>0?lv.upgradeCost:"—")+"</td><td>"+lv.sellValue+"</td></tr>";
 }
 th+="</table></div>";
}
document.getElementById("tower-section").innerHTML=th;
var mh="<h2 style=\"color:#ffd700;margin:20px 0\">👾 怪物一览</h2>";
mh+="<table><tr><th>图标</th><th>名称</th><th>HP</th><th>速度</th><th>护甲</th><th>金币</th><th>漏怪</th><th>特殊</th></tr>";
var ekeys=Object.keys(cfg.enemies);
for(var ei=0;ei<ekeys.length;ei++){
 var e=cfg.enemies[ekeys[ei]];
 var tags=[];
 if(e.isFlying)tags.push("飞行");
 if(e.isImmuneToSlow)tags.push("免疫减速");
 if(e.explodesOnDeath)tags.push("爆炸("+e.explosionRadius+"px)");
 if(e.id==="boss")tags.push("治疗光环");
 mh+="<tr><td>"+e.icon+"</td><td>"+e.name+"</td><td>"+e.maxHP+"</td><td>"+e.moveSpeed+"</td><td>"+e.armor+"</td><td>"+e.goldReward+"</td><td>"+e.hpLeakCost+"</td><td>"+(tags.length?tags.join(" · "):"—")+"</td></tr>";
}
mh+="</table>";
document.getElementById("monster-section").innerHTML=mh;
})();
</script>
</body>
</html>
