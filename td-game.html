<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, initial-scale=1.0">
<title>塔防游戏 - Tower Defense</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-container">
    <canvas id="game-canvas" width="1024" height="768"></canvas>

    <div id="mode-select">
        <div class="mode-select-bg"></div>
        <div class="mode-select-content">
            <h1 class="mode-title">🛡️ 保卫萝卜</h1>
            <p class="mode-subtitle">Tower Defense</p>
            <div class="mode-buttons">
                <button class="mode-btn mode-btn-normal" id="btn-mode-normal">
                    <span class="mode-btn-icon">🗺️</span><span class="mode-btn-label">普通模式</span>
                    <span class="mode-btn-desc">8波预设关卡</span>
                </button>
                <button class="mode-btn mode-btn-endless" id="btn-mode-endless">
                    <span class="mode-btn-icon">♾️</span><span class="mode-btn-label">无尽模式</span>
                    <span class="mode-btn-desc">无限波次 · Boss每5波</span>
                </button>
            </div>
            <div class="mode-buttons" style="margin-top:16px">
                <button class="mode-btn mode-btn-bestiary" id="btn-bestiary-towers" style="min-width:140px;padding:16px 24px">
                    <span class="mode-btn-icon">🗼</span><span class="mode-btn-label">炮台图鉴</span>
                    <span class="mode-btn-desc">6座炮塔详细数据</span>
                </button>
                <button class="mode-btn mode-btn-bestiary" id="btn-bestiary-monsters" style="min-width:140px;padding:16px 24px">
                    <span class="mode-btn-icon">👾</span><span class="mode-btn-label">怪物图鉴</span>
                    <span class="mode-btn-desc">5种怪物属性一览</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Tower Bestiary Overlay -->
    <div id="bestiary-towers" class="bestiary-overlay">
        <div class="bestiary-content">
            <div class="bestiary-header"><h2>🗼 炮台图鉴</h2><button class="bestiary-close" id="close-towers">✕</button></div>
            <div class="bestiary-body" id="bestiary-towers-body"></div>
        </div>
    </div>

    <!-- Monster Bestiary Overlay -->
    <div id="bestiary-monsters" class="bestiary-overlay">
        <div class="bestiary-content">
            <div class="bestiary-header"><h2>👾 怪物图鉴</h2><button class="bestiary-close" id="close-monsters">✕</button></div>
            <div class="bestiary-body" id="bestiary-monsters-body"></div>
        </div>
    </div>

    <div id="hud">
        <div class="hud-hearts" id="hud-hearts"></div>
        <div class="hud-gold" id="hud-gold">200</div>
        <div class="hud-wave" id="hud-wave">准备战斗</div>
    </div>

    <div id="hud-right">
        <button class="hud-btn" id="btn-next-wave">下一波 ▶</button>
        <button class="hud-btn" id="btn-endless-start" style="display:none;">▶ 开始无尽</button>
        <button class="hud-btn" id="btn-speed">1x</button>
        <button class="hud-btn" id="btn-pause">⏸ 暂停</button>
    </div>

    <div id="build-panel"></div>
    <div id="tower-info-panel"></div>
    <div id="wave-announce"></div>

    <div id="pause-overlay">
        <div class="pause-content">
            <div class="pause-icon">⏸</div>
            <div class="pause-text">游戏已暂停</div>
            <button class="pause-resume-btn">▶ 继续</button>
            <button class="pause-home-btn">🏠 返回主页</button>
        </div>
    </div>

    <div id="game-over-panel">
        <div id="game-over-title"></div>
        <div id="game-over-subtitle"></div>
        <button id="game-over-btn">重新开始</button>
    </div>

    <button id="btn-back" title="返回主菜单">🏠</button>
</div>

<script src="js/core/eventbus.js"></script>
<script src="js/rendering/bezier.js"></script>
<script src="js/data/data.js"></script>
<script src="js/systems/path.js"></script>
<script src="js/entities/enemy.js"></script>
<script src="js/entities/tower.js"></script>
<script src="js/entities/projectile.js"></script>
<script src="js/entities/obstacle.js"></script>
<script src="js/systems/wave.js"></script>
<script src="js/systems/economy.js"></script>
<script src="js/ui/input.js"></script>
<script src="js/rendering/renderer.js"></script>
<script src="js/ui/ui.js"></script>
<script src="js/core/game.js"></script>
<script src="js/core/main.js"></script>
</body>
</html>
