<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏中心 - Game Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;
font-family:'Segoe UI',sans-serif;color:#fff;overflow-x:hidden}
.header{text-align:center;padding:40px 20px 30px}
.header h1{font-size:42px;background:linear-gradient(90deg,#ffd700,#ff6b6b,#4ecdc4);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:#888;font-size:16px}
.games-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;padding:20px 40px 60px;max-width:1100px;margin:0 auto}
.game-card{width:200px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
border-radius:20px;padding:28px 20px;text-align:center;cursor:pointer;
transition:all .3s;text-decoration:none;color:#fff;display:block}
.game-card:hover{background:rgba(255,255,255,0.12);transform:translateY(-8px);
box-shadow:0 16px 40px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.3)}
.game-card-icon{font-size:56px;margin-bottom:16px;display:block}
.game-card-title{font-size:20px;font-weight:bold;margin-bottom:6px}
.game-card-desc{font-size:12px;color:#aaa;line-height:1.5}
.game-card.coming-soon{opacity:0.5;cursor:default}
.game-card.coming-soon:hover{transform:none;box-shadow:none;border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.06)}
.badge{display:inline-block;background:#ff6b6b;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:8px}
.badge.new{background:#4ecdc4}
.footer{text-align:center;padding:20px;color:#555;font-size:12px;position:fixed;bottom:0;width:100%}
</style>
</head>
<body>
<div class="header">
    <h1>🎮 游戏中心</h1>
    <p>选择一个游戏开始游玩</p>
</div>
<div class="games-grid">
    <a href="td-game/td-game.html" class="game-card">
        <span class="game-card-icon">🛡️</span>
        <div class="game-card-title">保卫萝卜</div>
        <div class="game-card-desc">2D俯视塔防 · 贝塞尔路径<br>多种炮塔 · 无尽模式 · Boss战</div>
        <span class="badge new">已更新</span>
    </a>

    <a href="cultivation-rpg/index.html" class="game-card">
        <span class="game-card-icon">🏯</span>
        <div class="game-card-title">RPG</div>
        <div class="game-card-desc">像素风修仙RPG · 5大境界<br>回合战斗 · 三界地图 · 隐藏洞穴</div>
        <span class="badge new">新游戏</span>
    </a>

    <a href="RPG/index.html" class="game-card">
        <span class="game-card-icon">🏯</span>
        <div class="game-card-title">RPG</div>
        <div class="game-card-desc">问道长生<br>v0.1</div>
        <span class="badge new">新游戏</span>
    </a>

    <a href="Demo/index.html" class="game-card">
        <span class="game-card-icon">🏯</span>
        <div class="game-card-title">Demo</div>
        <div class="game-card-desc">Demo<br>Test</div>
        <span class="badge new">新游戏</span>
    </a>

    <a href="xiuxian-open-world/index.html" class="game-card">
        <span class="game-card-icon">🌄</span>
        <div class="game-card-title">修仙开放世界</div>
        <div class="game-card-desc">Canvas像素开放世界<br>宗门 · 洞窟 · 回合战斗</div>
        <span class="badge new">新游戏</span>
    </a>

    <div class="game-card coming-soon">
        <span class="game-card-icon">🎯</span>
        <div class="game-card-title">即将推出</div>
        <div class="game-card-desc">新游戏开发中...</div>
        <span class="badge">敬请期待</span>
    </div>
</div>
<div class="footer">Game Center &copy; 2026</div>
</body>
</html>
